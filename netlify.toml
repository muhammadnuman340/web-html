# Netlify — deploy from GitHub (repo: muhammadnuman340/web-html)
[build]
  base = "numanx-omega"
  command = "npm ci && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # Optional (set in Netlify UI → Environment variables, scope: Builds):
  # VITE_PADDLE_TOKEN, VITE_PADDLE_PRICE_ID, VITE_PADDLE_ENV, VITE_PADDLE_SUCCESS_URL

# React Router (SPA) — all routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
