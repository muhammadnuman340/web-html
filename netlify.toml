# Netlify — deploy from GitHub (repo: muhammadnuman340/web-html)
[build]
  base = "numanx-omega"
  command = "npm ci && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# React Router (SPA) — all routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
